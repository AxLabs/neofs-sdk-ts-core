syntax = "proto3";

package test.advanced;

option go_package = "github.com/test/advanced";

// Advanced types test
message AdvancedMessage {
  // Repeated fields
  repeated string tags = 1;
  repeated int32 numbers = 2;
  repeated User users = 3;
  
  // Map fields
  map<string, string> metadata = 4;
  map<int32, User> user_map = 5;
  
  // Oneof fields
  oneof data {
    string text_data = 6;
    bytes binary_data = 7;
    int64 numeric_data = 8;
  }
  
  // Optional fields (proto3)
  optional string optional_field = 9;
  
  // All numeric types
  int32 int32_field = 10;
  int64 int64_field = 11;
  uint32 uint32_field = 12;
  uint64 uint64_field = 13;
  sint32 sint32_field = 14;
  sint64 sint64_field = 15;
  fixed32 fixed32_field = 16;
  fixed64 fixed64_field = 17;
  sfixed32 sfixed32_field = 18;
  sfixed64 sfixed64_field = 19;
  float float_field = 20;
  double double_field = 21;
  bool bool_field = 22;
  string string_field = 23;
  bytes bytes_field = 24;
  
  // Nested message
  User user = 25;
  
  // Enum field
  Status status = 26;
}

message User {
  string id = 1;
  string name = 2;
  string email = 3;
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
  STATUS_PENDING = 3;
}
