syntax = "proto3";

package test.edge;

option go_package = "github.com/test/edge";

// Test various edge cases and complex scenarios

// Message with all field types
message AllTypes {
  // Basic types
  double double_field = 1;
  float float_field = 2;
  int32 int32_field = 3;
  int64 int64_field = 4;
  uint32 uint32_field = 5;
  uint64 uint64_field = 6;
  sint32 sint32_field = 7;
  sint64 sint64_field = 8;
  fixed32 fixed32_field = 9;
  fixed64 fixed64_field = 10;
  sfixed32 sfixed32_field = 11;
  sfixed64 sfixed64_field = 12;
  bool bool_field = 13;
  string string_field = 14;
  bytes bytes_field = 15;
  
  // Repeated fields
  repeated string repeated_string = 16;
  repeated int32 repeated_int32 = 17;
  
  // Regular fields (removed optional for proto3 compatibility)
  string optional_string = 18;
  int32 optional_int32 = 19;
}

// Message with deeply nested structure
message DeepNesting {
  message Level1 {
    message Level2 {
      message Level3 {
        message Level4 {
          string deepest_field = 1;
        }
        Level4 level4 = 1;
      }
      Level3 level3 = 1;
    }
    Level2 level2 = 1;
  }
  Level1 level1 = 1;
}

// Message with enum and nested enum
message EnumMessage {
  enum OuterEnum {
    OUTER_UNSPECIFIED = 0;
    OUTER_FIRST = 1;
    OUTER_SECOND = 2;
  }
  
  message InnerMessage {
    enum InnerEnum {
      INNER_UNSPECIFIED = 0;
      INNER_A = 1;
      INNER_B = 2;
    }
    InnerEnum inner_enum = 1;
  }
  
  OuterEnum outer_enum = 1;
  InnerMessage inner = 2;
}

// Message with reserved fields
message ReservedMessage {
  reserved 1, 2, 3;
  reserved "old_field1", "old_field2";
  
  string current_field = 4;
}

// Message with oneof
message OneofMessage {
  oneof choice {
    string string_choice = 1;
    int32 int_choice = 2;
    bool bool_choice = 3;
  }
}
