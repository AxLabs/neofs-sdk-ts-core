syntax = "proto3";

package test.simple_advanced;

option go_package = "github.com/test/simple_advanced";

// Simple advanced types test
message SimpleAdvancedMessage {
  // Repeated fields
  repeated string tags = 1;
  repeated int32 numbers = 2;
  
  // All numeric types
  int32 int32_field = 3;
  int64 int64_field = 4;
  uint32 uint32_field = 5;
  uint64 uint64_field = 6;
  sint32 sint32_field = 7;
  sint64 sint64_field = 8;
  fixed32 fixed32_field = 9;
  fixed64 fixed64_field = 10;
  sfixed32 sfixed32_field = 11;
  sfixed64 sfixed64_field = 12;
  float float_field = 13;
  double double_field = 14;
  bool bool_field = 15;
  string string_field = 16;
  bytes bytes_field = 17;
  
  // Enum field
  Status status = 18;
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
  STATUS_PENDING = 3;
}
